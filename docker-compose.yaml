services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: final-app
    ports:
      - "8083:80"
    volumes:
      - ./var:/app/var
      - ./templates:/app/templates
      - ./public:/app/public
      - ./src:/app/src
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3308/${MYSQL_DATABASE}?serverVersion=8.0.32&charset=utf8mb4"
      APP_ENV: dev
      APP_DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: mysql:8.0.32
    container_name: final-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - platform-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  platform-network:
    driver: bridge

volumes:
  db_data: